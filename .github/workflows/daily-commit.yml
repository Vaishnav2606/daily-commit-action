name: Daily Scheduled Commit

on:
  schedule:
    - cron: '23 4 * * *'   # Specific minute + hour (UTC)
  workflow_dispatch:

permissions:
  contents: write   # 🔥 REQUIRED for git push

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "24f2005374@ds.study.iitm.ac.in"

      - name: Step using email 24f2005374@ds.study.iitm.ac.in
        run: echo "Email step confirmed"

      - name: Create daily commit
        run: |
          echo "Last run: $(date -u)" >> daily-log.txt
          git add daily-log.txt
          git commit -m "Automated daily commit - $(date -u)" || echo "No changes"
          git push
